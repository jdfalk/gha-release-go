name: 'Go Release Build'
description: 'Build and release Go binaries via GoReleaser'
author: 'jdfalk'

inputs:
  go-matrix:
    description: 'JSON encoded Go build matrix'
    required: false
    default: '{}'
  protobuf-artifacts:
    description: 'Whether protobuf artifacts are available'
    required: false
    default: 'false'
  release-version:
    description: 'Release version to embed in binaries'
    required: false
    default: ''
  system-packages:
    description: 'Space-separated list of apt packages to install before build'
    required: false
    default: ''
  pre-build-script:
    description: 'Shell script to run before goreleaser'
    required: false
    default: ''
  go-experiment:
    description: 'Value for GOEXPERIMENT environment variable'
    required: false
    default: ''
  github-token:
    description: 'Token used for git push of release tags. Must have
      workflows:write when the tag includes commits that modify
      .github/workflows/ files (typically a GitHub App installation
      token minted via actions/create-github-app-token). Falls back
      to the default GITHUB_TOKEN for runs that do not touch workflow
      files.'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Download protobuf artifacts
      if: inputs.protobuf-artifacts == 'true'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: protobuf-generated
        path: proto-generated

    - name: Install system packages
      if: inputs.system-packages != ''
      shell: bash
      env:
        PACKAGES: ${{ inputs.system-packages }}
      run: sudo apt-get update && sudo apt-get install -y $PACKAGES

    - name: Run pre-build script
      if: inputs.pre-build-script != ''
      shell: bash
      run: ${{ inputs.pre-build-script }}

    - name: Build and release Go via GoReleaser
      uses: jdfalk/release-go-action@319bd21f49f5ad1cd0f806531a0fd23d64facaa7 # v1.4.0
      env:
        GOEXPERIMENT: ${{ inputs.go-experiment }}
      with:
        module-path: .
        tag: ${{ inputs.release-version || github.ref_name }}
        go-version: '1.24'
        run-tests: 'false'
        run-linters: 'true'
        create-release: 'true'
        skip-publish: 'false'
        github-token: ${{ inputs.github-token }}

    - name: Upload Go artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: go-binaries
        path: dist/**
        if-no-files-found: ignore
        retention-days: 7
